name: Pull Request

on:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - '**/docs/**'
      - 'LICENSE'
      - '.github/CODEOWNERS'
      - '.github/workflows/**'
      - '!.github/workflows/pull-request.yml'
      - '.github/dependabot.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  install:
    name: 📦 Install dependencies
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.cache-node-modules.outputs.cache-hit }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch target
        run: git fetch origin ${{ env.PR_BASE_REF }}

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v7
        with:
          node-version-file: ".nvmrc"

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v6
        with:
          path: |
            node_modules
            .yarn/cache
          key: ${{ runner.os }}-node-modules-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: yarn install --frozen-lockfile

    env:
      PR_BASE_REF: ${{ github.event.pull_request.base.ref || 'main' }}

  lint:
    name: 🔍 Lint affected packages
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch target
        run: git fetch origin ${{ env.PR_BASE_REF }}

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v7
        with:
          node-version-file: ".nvmrc"

      - name: Restore node_modules cache
        uses: actions/cache@v6
        with:
          path: |
            node_modules
            .yarn/cache
          key: ${{ runner.os }}-node-modules-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Lint affected packages
        run: yarn nx affected:lint --base=origin/${{ env.PR_BASE_REF }} --parallel --max-parallel=3 

    env:
      PR_BASE_REF: ${{ github.event.pull_request.base.ref || 'main' }}

  build:
    name: 🏭 Build affected packages
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch target
        run: git fetch origin ${{ env.PR_BASE_REF }}

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v7
        with:
          node-version-file: ".nvmrc"

      - name: Restore node_modules cache
        uses: actions/cache@v6
        with:
          path: |
            node_modules
            .yarn/cache
          key: ${{ runner.os }}-node-modules-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Build affected packages
        run: yarn nx affected:build --base=origin/${{ env.PR_BASE_REF }} --parallel --max-parallel=3

    env:
      PR_BASE_REF: ${{ github.event.pull_request.base.ref || 'main' }}

  test:
    name: 🧪 Run tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch target
        run: git fetch origin ${{ env.PR_BASE_REF }}

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v7
        with:
          node-version-file: ".nvmrc"

      - name: Restore node_modules cache
        uses: actions/cache@v6
        with:
          path: |
            node_modules
            .yarn/cache
          key: ${{ runner.os }}-node-modules-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Build affected packages
        run: yarn nx affected:build --base=origin/${{ env.PR_BASE_REF }} --parallel --max-parallel=3

      - name: Test affected packages
        run: yarn nx affected:test --base=origin/${{ env.PR_BASE_REF }} --parallel --max-parallel=3

    env:
      PR_BASE_REF: ${{ github.event.pull_request.base.ref || 'main' }}
